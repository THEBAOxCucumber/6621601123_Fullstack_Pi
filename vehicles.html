<div class="section">

  <div class="section-header">
    <h2>Vehicle List</h2>
    <button class="btn-add">+ Add Vehicle</button>
  </div>

  <!-- search + filter -->
  <div class="filter-bar">
    <input id="search" placeholder="🔍 Search plate..." />

    <div class="filters">
      <button onclick="setFilter('ALL')" class="active">All</button>
      <button onclick="setFilter('ACTIVE')">Active</button>
      <button onclick="setFilter('IDLE')">Idle</button>
      <button onclick="setFilter('MAINTENANCE')">Maintenance</button>
      <button onclick="setFilter('RETIRED')">Retired</button>
    </div>
  </div>

  <!-- table -->
  <table class="vehicle-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>PLATE</th>
        <th>TYPE</th>
        <th>BRAND/MODEL</th>
        <th>STATUS</th>
        <th>MILEAGE</th>
        <th>DRIVER</th>
        <th>ACTIONS</th>
      </tr>
    </thead>

    <tbody id="vehicle-table"></tbody>
  </table>

</div>

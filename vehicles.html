<link rel="stylesheet" href="css/vehicles.css"/>
<div class="section active">

  <div class="section-header">
    <h2>Vehicle List</h2>
    <button class="btn-add">+ Add Vehicle</button>
  </div>

  <!-- search + filter -->
  <div class="filter-bar">
    <input id="search" placeholder="🔍 Search plate..." />

    <div class="filters">
  <button onclick="setFilter('ALL', this)" class="active">All</button>
  <button onclick="setFilter('ACTIVE', this)">Active</button>
  <button onclick="setFilter('IDLE', this)">Idle</button>
  <button onclick="setFilter('MAINTENANCE', this)">Maintenance</button>
  <button onclick="setFilter('RETIRED', this)">Retired</button>
</div>
  </div>

  <!-- table -->
  <table class="vehicle-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>PLATE</th>
        <th>TYPE</th>
        <th>BRAND/MODEL</th>
        <th>STATUS</th>
        <th>MILEAGE</th>
        <th>DRIVER</th>
        <th>ACTIONS</th>
      </tr>
    </thead>

    <tbody id="vehicle-table"></tbody>
  </table>

</div>

<link rel="stylesheet" href="css/tracker.css">

<div>
    <select id="tripSelect"></select>
    <button id="addCheckpointBtn">+ Add Checkpoint</button>
  </div>
  </div>

  <div class="tracker-card">

<div class="tracker-info">

  <div>
    VEHICLE
    <b id="vehicle">-</b>
  </div>

  <div>
    DRIVER
    <b id="driver">-</b>
  </div>

  <div>
    ROUTE
    <b id="route">-</b>
  </div>

  <div>
    DISTANCE
    <b id="distance">-</b>
  </div>

  <div>
    CARGO
    <b id="cargo">-</b>

    <div class="progress-line" id="progressLine"></div>

<div id="checkpoint-list"></div>
</div>

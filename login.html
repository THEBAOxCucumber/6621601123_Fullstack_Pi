<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Login - Fleet Management</title>
  <link rel="stylesheet" href="css/login.css">
</head>

<body class="login-body">

  <div class="login-container">

    <div class="login-box">
      <h1>Fleet Management</h1>
      <p>เข้าสู่ระบบ</p>

      <input id="username" placeholder="Username" class="login-input">
      <input id="password" type="password" placeholder="Password" class="login-input">

      <button onclick="submitLogin()" class="login-btn">
        LOGIN →
      </button>

      <div id="error" class="login-error"></div>
    </div>

  </div>

  <script src="js/auth.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
